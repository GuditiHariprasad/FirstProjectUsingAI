# ========================================
# Automation Framework Configuration
# ========================================

# ========================================
# UI CONFIGURATION
# ========================================

# Base URL for UI testing
# Update this URL based on the application you want to test
ui.base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# Browser type: chrome or firefox
# Default: chrome
ui.browser=chrome

# Implicit wait time in seconds
# Implicit waits apply to all element searches
ui.implicit.wait=10

# Explicit wait time in seconds
# Used in WebDriverWait for specific elements
ui.explicit.wait=20

# Run in headless mode (true/false)
# Headless mode runs browser without GUI (useful for CI/CD)
# Default: false (visible browser)
ui.headless=false

# ========================================
# API CONFIGURATION
# ========================================

# Base URL for API testing
# Update this based on the API you want to test
api.base.url=https://api.restful-api.dev

# Request timeout in milliseconds
api.request.timeout=5000

# ========================================
# LOGGING CONFIGURATION
# ========================================

# Log level: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
# Default: INFO
log.level=INFO

# ========================================
# NOTES:
# ========================================
# 1. All URLs should include the protocol (http:// or https://)
# 2. Update browser and wait times based on your environment
# 3. For CI/CD environments, set ui.headless=true
# 4. API timeout should be increased if testing slow APIs
# 5. Ensure all URLs are accessible from your network
# ========================================

